<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>Mobile Phone Camera Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #3b82f6;
      --border: #333;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: calc(1.5rem + var(--safe-bottom));
    }

    header {
      padding: 1.25rem 1rem 1rem;
      text-align: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    main {
      flex: 1;
      padding: 0 1rem;
    }

    .tool-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .tool-link {
      display: block;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      touch-action: manipulation;
      transition: background 0.15s;
    }

    .tool-link:active {
      background: #1f1f1f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mobile Phone Camera Tools</h1>
    <p class="subtitle">Choose a tool</p>
  </header>

  <main>
    <ul class="tool-list">
      <li>
        <a class="tool-link" href="image_capture/image_capture.html">Image Capture</a>
      </li>
    </ul>
  </main>
</body>
</html>
