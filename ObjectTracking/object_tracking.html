<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>Surface Tracking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #3b82f6;
      --accent-pressed: #2563eb;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: calc(1rem + var(--safe-bottom));
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0 0 0.75rem;
    }

    .wide-section { flex-shrink: 0; }

    .wide-view {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }

    .wide-view canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .wide-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      z-index: 2;
    }

    .wide-overlay-top {
      padding: calc(0.65rem + var(--safe-top)) 0.85rem 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 2.5rem;
    }

    .overlay-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 2.5rem;
      height: 2.5rem;
      background: rgba(0, 0, 0, 0.35);
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
      touch-action: manipulation;
      pointer-events: auto;
    }

    .overlay-btn:active { background: rgba(0, 0, 0, 0.55); }

    .page-title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
    }

    .stats,
    .overlay-metrics {
      margin-top: 0.35rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.4;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    }

    .overlay-metrics {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.15rem;
    }

    .zoom-section {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      padding: 0;
    }

    .zoom-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }

    .zoom-view {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      overflow: hidden;
      position: relative;
    }

    .zoom-view canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .zoom-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 2;
    }

    .zoom-overlay-top {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.65rem 0.85rem 1.5rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
    }

    .zoom-overlay-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.65rem;
    }

    .zoom-overlay-top .zoom-label {
      flex: 1;
      min-width: 0;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      margin-bottom: 0;
    }

    .capture-btn {
      pointer-events: auto;
      flex-shrink: 0;
      padding: 0.55rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .capture-btn:active:not(:disabled) {
      background: var(--accent-pressed);
    }

    .capture-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .error {
      margin: 0.75rem 1rem 0;
      padding: 1rem;
      background: #2a1010;
      border: 1px solid #5c2020;
      border-radius: 8px;
      color: #f88;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .error.hidden,
    .hidden {
      display: none !important;
    }

    #video {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <p class="error hidden" id="errorEl"></p>

    <section class="wide-section" aria-label="Live camera">
      <div class="wide-view" id="wideView">
        <canvas id="wideCanvas"></canvas>
        <div class="wide-overlay">
          <div class="wide-overlay-top">
            <div class="top-bar">
              <button class="overlay-btn back-btn" id="backBtn" type="button" aria-label="Back to tools">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
              </button>
              <button class="overlay-btn menu-btn" id="menuBtn" type="button" aria-label="Settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                  <line x1="4" y1="7" x2="20" y2="7"/>
                  <line x1="4" y1="12" x2="20" y2="12"/>
                  <line x1="4" y1="17" x2="20" y2="17"/>
                </svg>
              </button>
              <div class="page-title">Surface Tracking</div>
              <div style="width:5.35rem;flex-shrink:0;"></div>
            </div>
            <p class="stats" id="stats">Starting camera…</p>
            <div class="overlay-metrics" id="topMetrics">
              <span id="fpsMetric">FPS · —</span>
              <span id="extractedMetric">Extracted · —</span>
              <span id="matchedMetric">Matched · —</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="zoom-section" aria-label="Reference view">
      <div class="zoom-view" id="zoomView">
        <canvas id="centerCanvas"></canvas>
        <div class="zoom-overlay">
          <div class="zoom-overlay-top">
            <div class="zoom-overlay-header">
              <span class="zoom-label" id="centerLabel">Center view · live crop</span>
              <button class="capture-btn" id="captureReferenceBtn" type="button" disabled>
                Capture reference image
              </button>
            </div>
            <div class="overlay-metrics hidden" id="centerMetrics">
              <span id="centerFeatureType">Feature · —</span>
              <span id="centerFeatureConfig">Config · —</span>
              <span id="centerFeatureCount">Features used · —</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <video id="video" playsinline autoplay muted></video>

  <script src="settings.js"></script>
  <script src="opencv-processing.js"></script>
  <script>
    const video = document.getElementById('video');
    const wideView = document.getElementById('wideView');
    const wideCanvas = document.getElementById('wideCanvas');
    const centerCanvas = document.getElementById('centerCanvas');
    const wideCtx = wideCanvas.getContext('2d');
    const statsEl = document.getElementById('stats');
    const errorEl = document.getElementById('errorEl');
    const centerLabel = document.getElementById('centerLabel');
    const centerMetrics = document.getElementById('centerMetrics');
    const centerFeatureType = document.getElementById('centerFeatureType');
    const centerFeatureConfig = document.getElementById('centerFeatureConfig');
    const centerFeatureCount = document.getElementById('centerFeatureCount');
    const fpsMetric = document.getElementById('fpsMetric');
    const extractedMetric = document.getElementById('extractedMetric');
    const matchedMetric = document.getElementById('matchedMetric');
    const captureReferenceBtn = document.getElementById('captureReferenceBtn');
    const backBtn = document.getElementById('backBtn');
    const menuBtn = document.getElementById('menuBtn');

    let appSettings = loadTrackingSettings();
    let activeStream = null;
    let renderLoopActive = false;
    let openCvLoadState = 'idle';
    let referenceRawImageData = null;
    let referenceImageData = null;
    let referenceFeatures = null;
    let referenceAnnotatedImage = null;
    let processingInFlight = false;
    let trackingInFlight = false;
    let lastTrackingResult = null;
    let lastProcessedFrame = null;
    let lastFrameTimestamp = 0;
    let smoothedFps = 0;

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
      statsEl.textContent = 'Unavailable';
    }

    function clearError() {
      errorEl.classList.add('hidden');
      errorEl.textContent = '';
    }

    function setCenterLabel(text) {
      centerLabel.textContent = text;
    }

    function updateCenterMetrics(features) {
      if (!features || features.totalCount === 0) {
        centerMetrics.classList.add('hidden');
        return;
      }

      const blurSuffix = appSettings.applyBlur ? ' · blur 3×3' : '';
      centerFeatureType.textContent = `Feature · ${getFeatureDetectorLabel(features.detectorId)}`;
      centerFeatureConfig.textContent = `Config · ${features.configDescription}${blurSuffix}`;
      centerFeatureCount.textContent = `Features used · ${features.totalCount} (${features.visualizedCount} shown)`;
      centerMetrics.classList.remove('hidden');
    }

    function updateTopMetrics(trackingResult) {
      fpsMetric.textContent = `FPS · ${smoothedFps > 0 ? smoothedFps.toFixed(1) : '—'}`;

      if (!referenceFeatures) {
        extractedMetric.textContent = 'Extracted · —';
        matchedMetric.textContent = 'Matched · —';
        return;
      }

      if (!trackingResult) {
        extractedMetric.textContent = 'Extracted · —';
        matchedMetric.textContent = 'Matched · —';
        return;
      }

      extractedMetric.textContent = `Extracted · ${trackingResult.extractedCount}`;
      matchedMetric.textContent = `Matched · ${trackingResult.matchedCount}`;
    }

    function updateFps() {
      const now = performance.now();
      if (lastFrameTimestamp > 0) {
        const instantFps = 1000 / (now - lastFrameTimestamp);
        smoothedFps = smoothedFps > 0 ? smoothedFps * 0.85 + instantFps * 0.15 : instantFps;
      }
      lastFrameTimestamp = now;
    }

    function clearTrackingFeatures() {
      releaseReferenceFeatures(referenceFeatures);
      referenceFeatures = null;
      referenceAnnotatedImage = null;
      lastTrackingResult = null;
      lastProcessedFrame = null;
      centerMetrics.classList.add('hidden');
    }

    function updateReferenceButton() {
      captureReferenceBtn.textContent = referenceRawImageData && referenceFeatures
        ? 'Reset tracking features'
        : 'Capture reference image';
    }

    function resetTracking() {
      referenceRawImageData = null;
      referenceImageData = null;
      clearTrackingFeatures();
      updateReferenceButton();
      updateTopMetrics(null);
    }

    function stopActiveStream() {
      activeStream?.getTracks?.().forEach((track) => track.stop());
      activeStream = null;
      video.srcObject = null;
    }

    async function openCamera() {
      stopActiveStream();

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });

      activeStream = stream;
      video.srcObject = stream;
      await video.play();
    }

    function updateWideViewLayout() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) {
        return;
      }

      wideView.style.aspectRatio = `${vw} / ${vh}`;
    }

    function drawWidePreview() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;

      updateWideViewLayout();

      const displayW = Math.round(wideView.clientWidth);
      const displayH = Math.round(wideView.clientHeight);
      if (!displayW || !displayH) return;

      if (wideCanvas.width !== displayW || wideCanvas.height !== displayH) {
        wideCanvas.width = displayW;
        wideCanvas.height = displayH;
      }

      wideCtx.drawImage(video, 0, 0, vw, vh, 0, 0, displayW, displayH);

      if (lastTrackingResult?.found) {
        drawPerspectiveCross(
          wideCtx,
          {
            center: lastTrackingResult.center,
            crossSegments: lastTrackingResult.crossSegments
          },
          displayW / vw,
          displayH / vh
        );
      }
    }

    async function renderLiveCenterCrop() {
      const crop = captureCenterCrop(video, appSettings.cropSize);
      if (!crop) return null;

      if (!appSettings.applyBlur) {
        putImageDataOnCanvas(centerCanvas, crop);
        setCenterLabel(`Center view · live crop · ${appSettings.cropSize} × ${appSettings.cropSize}`);
        return crop;
      }

      if (openCvLoadState === 'ready') {
        const blurred = preprocessImageData(crop, true);
        putImageDataOnCanvas(centerCanvas, blurred);
        setCenterLabel(`Center view · blurred crop · ${appSettings.cropSize} × ${appSettings.cropSize}`);
        return blurred;
      }

      putImageDataOnCanvas(centerCanvas, crop);
      setCenterLabel(
        openCvLoadState === 'loading'
          ? 'Center view · loading OpenCV for blur…'
          : 'Center view · OpenCV unavailable'
      );
      return crop;
    }

    async function buildReferenceFeatures() {
      if (!referenceRawImageData) return;

      await loadOpenCv();
      referenceImageData = preprocessImageData(referenceRawImageData, appSettings.applyBlur);
      releaseReferenceFeatures(referenceFeatures);
      referenceFeatures = extractReferenceFeatures(referenceImageData, appSettings.featureDetector);

      const visualizationKeypoints = getTopKeypoints(
        referenceFeatures.keypointVector,
        MAX_VISUALIZED_FEATURES
      );
      referenceAnnotatedImage = drawFeaturesOnImage(referenceImageData, visualizationKeypoints);
      referenceFeatures.visualizedCount = visualizationKeypoints.length;
      referenceFeatures.keypointVector?.delete?.();
      referenceFeatures.keypointVector = null;
    }

    function buildCenterViewImage() {
      const refW = referenceImageData.width;
      const refH = referenceImageData.height;
      const matchedKeypoints = lastTrackingResult?.matchedReferenceKeypoints || [];
      let centerImage;
      let label;

      if (appSettings.reverseProjection && referenceFeatures) {
        if (
          lastTrackingResult?.found &&
          lastTrackingResult.inverseHomography &&
          lastProcessedFrame
        ) {
          centerImage = warpFrameToReferenceSpace(
            lastProcessedFrame,
            lastTrackingResult.inverseHomography,
            refW,
            refH
          );
          label = 'Center view · reverse projection';
        } else {
          centerImage = createGraySurface(refW, refH);
          label = 'Center view · reverse projection unavailable';
        }
      } else if (matchedKeypoints.length > 0) {
        centerImage = drawFeaturesOnImage(referenceImageData, matchedKeypoints);
        label = 'Center view · reference image · tracking features';
      } else {
        centerImage = referenceAnnotatedImage || referenceImageData;
        label = 'Center view · reference image';
      }

      if (matchedKeypoints.length > 0 && appSettings.reverseProjection) {
        centerImage = drawFeaturesOnImage(centerImage, matchedKeypoints);
        if (!label.includes('tracking features')) {
          label += ' · tracking features';
        }
      }

      return { centerImage, label };
    }

    function renderReferenceView() {
      if (!referenceRawImageData || !referenceImageData) return;

      const { centerImage, label } = buildCenterViewImage();
      putImageDataOnCanvas(centerCanvas, centerImage);
      setCenterLabel(label);
      updateCenterMetrics(referenceFeatures);
    }

    async function renderCenterView() {
      if (processingInFlight) return;
      processingInFlight = true;

      try {
        if (referenceRawImageData) {
          renderReferenceView();
          return;
        }

        await renderLiveCenterCrop();
        centerMetrics.classList.add('hidden');
      } catch (err) {
        console.error('Center view render failed:', err);
        showError(err.message || 'Failed to process image with OpenCV.');
      } finally {
        processingInFlight = false;
      }
    }

    function updateStats() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const openCvText = openCvLoadState === 'ready'
        ? 'OpenCV ready'
        : openCvLoadState === 'loading'
          ? 'OpenCV loading'
          : 'OpenCV not loaded';

      if (!vw || !vh) {
        statsEl.textContent = `${openCvText} · waiting for camera`;
        return;
      }

      statsEl.textContent = `${openCvText} · ${vw} × ${vh} · crop ${appSettings.cropSize}`;
    }

    async function runTrackingStep() {
      if (!referenceFeatures || trackingInFlight || openCvLoadState !== 'ready') {
        return;
      }

      const frame = captureVideoFrame(video);
      if (!frame) return;

      trackingInFlight = true;
      try {
        const processedFrame = preprocessImageData(frame, appSettings.applyBlur);
        lastProcessedFrame = processedFrame;
        lastTrackingResult = estimatePlanarPatternCenter(
          referenceFeatures,
          processedFrame,
          { width: referenceImageData.width, height: referenceImageData.height }
        );
      } catch (err) {
        console.error('Tracking failed:', err);
        lastTrackingResult = null;
      } finally {
        trackingInFlight = false;
      }
    }

    async function renderFrame() {
      updateFps();
      await runTrackingStep();
      drawWidePreview();
      await renderCenterView();
      updateTopMetrics(lastTrackingResult);
      updateStats();
    }

    function startRenderLoop() {
      if (renderLoopActive) return;
      renderLoopActive = true;

      const tick = async () => {
        if (!renderLoopActive) return;
        await renderFrame();
        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    }

    function stopRenderLoop() {
      renderLoopActive = false;
    }

    async function ensureOpenCv() {
      if (openCvLoadState === 'ready') return true;
      if (openCvLoadState === 'failed') return false;

      openCvLoadState = 'loading';
      updateStats();

      try {
        await loadOpenCv();
        openCvLoadState = 'ready';
        captureReferenceBtn.disabled = false;
        return true;
      } catch (err) {
        openCvLoadState = 'failed';
        console.error('OpenCV load failed:', err);
        return false;
      } finally {
        updateStats();
      }
    }

    async function captureReferenceImage() {
      const crop = captureCenterCrop(video, appSettings.cropSize);
      if (!crop) {
        return;
      }

      referenceRawImageData = cloneImageData(crop);

      try {
        await ensureOpenCv();
        await buildReferenceFeatures();
        renderReferenceView();
        lastTrackingResult = null;
        updateReferenceButton();
      } catch (err) {
        resetTracking();
        showError(err.message || 'Could not extract features from the reference image.');
      }
    }

    function applyStoredSettings() {
      const previousDetector = appSettings.featureDetector;
      const previousBlur = appSettings.applyBlur;
      appSettings = loadTrackingSettings();

      if (
        referenceRawImageData &&
        (previousDetector !== appSettings.featureDetector || previousBlur !== appSettings.applyBlur)
      ) {
        buildReferenceFeatures()
          .then(() => {
            renderReferenceView();
            lastTrackingResult = null;
          })
          .catch((err) => {
            console.error('Feature re-detection failed:', err);
          });
      }
    }

    async function init() {
      if (!navigator.mediaDevices?.getUserMedia) {
        showError('Camera access is not supported in this browser.');
        return;
      }

      clearError();

      try {
        await openCamera();
        await new Promise((resolve) => {
          if (video.videoWidth) return resolve();
          video.addEventListener('loadedmetadata', resolve, { once: true });
        });

        updateWideViewLayout();
        captureReferenceBtn.disabled = false;
        startRenderLoop();
        ensureOpenCv();
      } catch (err) {
        showError(
          'Could not open the environment camera. Use HTTPS or localhost and grant camera permission. ' +
          (err.message || err.name || '')
        );
      }
    }

    backBtn.addEventListener('click', () => {
      window.location.href = '../index.html';
    });

    menuBtn.addEventListener('click', () => {
      window.location.href = 'settings.html';
    });

    captureReferenceBtn.addEventListener('click', async () => {
      if (referenceRawImageData && referenceFeatures) {
        resetTracking();
        await renderFrame();
        return;
      }
      captureReferenceImage();
    });

    window.addEventListener('pageshow', async () => {
      applyStoredSettings();
      updateReferenceButton();
      if (activeStream) {
        await renderFrame();
      }
    });

    window.addEventListener('resize', () => {
      if (video.videoWidth) {
        drawWidePreview();
      }
    });

    window.addEventListener('beforeunload', () => {
      stopRenderLoop();
      stopActiveStream();
      resetTracking();
    });

    init();
  </script>
</body>
</html>
