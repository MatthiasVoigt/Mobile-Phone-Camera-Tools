<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>JavaScript Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar top-bar-test">
    <a class="icon-btn" href="index.html" aria-label="Back">←</a>
    <button id="toggleProcessing" class="action-btn toggle-processing-btn" type="button">Turn Processing ON</button>
    <h1 id="pageTitle">JavaScript</h1>
  </header>

  <main class="main-content">
    <div class="stage">
      <canvas id="preview"></canvas>
      <div class="fps-overlay">
        <div id="resolutionLabel" class="fps-label">—</div>
        <div id="displayFps" class="fps-label">Display FPS: 0</div>
        <div id="processingFps" class="fps-label hidden">Processing FPS: 0</div>
        <div id="jsComputeMs" class="fps-label fps-label-timing hidden">JS compute (avg): — ms</div>
      </div>
    </div>
    <p id="status" class="status-text">Requesting camera…</p>
    <section class="step-log-panel">
      <h2>Step log</h2>
      <p id="lastStep">Last step: —</p>
      <pre id="stepLog"></pre>
      <button id="copyStepLogBtn" class="action-btn step-log-copy-btn" type="button">Copy log</button>
    </section>
  </main>

  <video id="camera" playsinline muted hidden></video>
  <script src="step-log.js?v=6"></script>
  <script src="fps-utils.js?v=6"></script>
  <script src="image-processing.js?v=6"></script>
  <script src="test-runner.js?v=6"></script>
  <script>
    Exp02Log.step('Page loaded');
    Exp02TestRunner.startTestRunner({
      title: 'JavaScript',
      storageKey: 'exp02-js-fps',
      processFrame(imageData, width, height) {
        return cannyEdgeDetect(imageData, width, height);
      },
    });
  </script>
</body>
</html>
