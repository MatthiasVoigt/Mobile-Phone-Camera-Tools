<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>Full Optimization Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar top-bar-test">
    <a class="icon-btn" href="index.html" aria-label="Back">←</a>
    <button id="toggleProcessing" class="action-btn toggle-processing-btn" type="button">Turn Processing ON</button>
    <h1 id="pageTitle">Full Optimization</h1>
  </header>

  <main class="main-content main-content--test">
    <div class="stage">
      <canvas id="preview"></canvas>
      <div class="fps-overlay">
        <div id="resolutionLabel" class="fps-label">—</div>
        <div id="displayFps" class="fps-label">Display FPS: 0</div>
        <div id="processingFps" class="fps-label hidden">Processing FPS: 0</div>
        <div id="wasmTimingGroup" class="wasm-timing-group hidden">
          <div id="wasmCopyInMs" class="fps-label fps-label-timing">WASM copy in (avg): — ms</div>
          <div id="wasmComputeMs" class="fps-label fps-label-timing">WASM compute (avg): — ms</div>
          <div id="wasmTotalMs" class="fps-label fps-label-timing">WASM total (avg): — ms</div>
        </div>
      </div>
    </div>
    <p id="status" class="status-text">Loading WebAssembly…</p>
    <section class="step-log-panel">
      <h2>Step log</h2>
      <p id="lastStep">Last step: —</p>
      <pre id="stepLog"></pre>
      <button id="copyStepLogBtn" class="action-btn step-log-copy-btn" type="button">Copy log</button>
    </section>
  </main>

  <video id="camera" playsinline muted hidden></video>
  <script src="step-log.js?v=8"></script>
  <script src="fps-utils.js?v=8"></script>
  <script src="test-runner.js?v=8"></script>
  <script src="image-processing-wasm.js?v=8"></script>
  <script src="wasm-bridge.js?v=8"></script>
  <script>
    Exp02Log.step('Page loaded');
    Exp02Wasm.setVerboseLogging(false);
    Exp02Wasm.initWasmBridge()
      .then(() => {
        Exp02Log.step('WebAssembly module ready (full optimization mode)');
        return Exp02TestRunner.startTestRunner({
          title: 'Full Optimization',
          storageKey: 'exp02-full-optimization-fps',
          optimization: 'full',
          processScale: 0.5,
          onReady(processWidth, processHeight) {
            Exp02Wasm.setupWasmBuffers(processWidth, processHeight);
          },
          onResize(processWidth, processHeight) {
            Exp02Wasm.setupWasmBuffers(processWidth, processHeight);
          },
          processFrame(imageData, width, height) {
            return Exp02Wasm.processFrameWasm(imageData, width, height);
          },
        });
      })
      .catch((error) => {
        Exp02Log.error('WebAssembly init failed: ' + (error.message || error));
        document.getElementById('status').textContent =
          'WebAssembly failed to load: ' + (error.message || error);
        console.error(error);
      });
  </script>
</body>
</html>
